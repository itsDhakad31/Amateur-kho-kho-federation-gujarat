services:
  - type: web
    name: amateur-kho-kho-federation-gujarat
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DEFAULT_ADMIN_EMAIL
        value: admin@akkfg.com
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
